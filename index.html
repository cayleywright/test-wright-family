<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Wright Family Slideshow (Test)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
    #img, #imgB, #vidA, #vidB { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; background: #000; display: none; }
    #caption { position: absolute; bottom: 50px; width: 100%; text-align: center; color: #fff; font-size: 16px; background: rgba(0,0,0,0.4); padding: 8px 12px; box-sizing: border-box; z-index: 5; }
    #controls { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 10; }
    #controls button { padding: 8px 14px; font-size: 18px; background: rgba(255,255,255,0.25); border: none; color: white; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <img id="img">
  <video id="vidA" playsinline preload="auto"></video>
  <video id="vidB" playsinline preload="auto"></video>
  <img id="imgB">
  <div id="caption"></div>
  <div id="controls">
    <button id="prev">&#9664;&#xFE0E;</button>
    <button id="pause">&#9208;</button>
    <button id="next">&#9654;&#xFE0E;</button>
    <button id="sound">Mute</button>
    <button id="videosOnly">Videos</button>
  </div>
  <script>
    // Double-buffered media: two <img> and two <video> elements rotate so the
    // next item is preloaded into the inactive element while the current one
    // plays. Hugely reduces transition stutter for videos.
    var imgs = [document.getElementById('img'), document.getElementById('imgB')];
    var vids = [document.getElementById('vidA'), document.getElementById('vidB')];
    var activeImg = 0, activeVid = 0;
    var preloaded = { img: [null, null], vid: [null, null] }; // url currently loaded in each slot

    var captionEl = document.getElementById('caption');
    var pauseBtn = document.getElementById('pause');

    var allItems = [], items = [], index = 0, paused = false;
    var timer = null, videoTimer = null, videosOnly = false, muted = false;

    function urlFor(item) { return item.url || ('public/images/' + item.file); }

    function captionFor(item) {
      var t = item.event || (item.file || '').replace(/\.[^/.]+$/, '');
      if (item.time) {
        var d = new Date(item.time);
        if (t.indexOf(String(d.getFullYear())) === -1)
          t += ' - ' + d.getFullYear();
      }
      return t;
    }

    function loadInto(elem, url, kind, slot) {
      if (preloaded[kind][slot] === url) return;
      elem.src = url;
      if (kind === 'vid') { elem.muted = muted; elem.load(); }
      preloaded[kind][slot] = url;
    }

    function pickSlot(kind, url, activeIdx) {
      // Prefer a slot that already has this URL preloaded; else fall back to active.
      if (preloaded[kind][0] === url) return 0;
      if (preloaded[kind][1] === url) return 1;
      return activeIdx;
    }

    function show() {
      clearTimeout(timer);
      clearTimeout(videoTimer);
      var item = items[index];
      var url = urlFor(item);
      captionEl.textContent = captionFor(item);

      if (item.media_type === 'video') {
        imgs.forEach(function(im) { im.style.display = 'none'; });
        var slot = pickSlot('vid', url, activeVid);
        loadInto(vids[slot], url, 'vid', slot);
        activeVid = slot;
        vids.forEach(function(v, i) {
          if (i === slot) { v.style.display = 'block'; v.play(); }
          else { v.pause(); v.style.display = 'none'; }
        });
        var cap = item.duration_secs ? item.duration_secs * 1000 : 60000;
        videoTimer = setTimeout(function() { if (!paused) advance(1); }, cap);
      } else {
        vids.forEach(function(v) { v.pause(); v.style.display = 'none'; });
        var slot = pickSlot('img', url, activeImg);
        loadInto(imgs[slot], url, 'img', slot);
        activeImg = slot;
        imgs.forEach(function(im, i) { im.style.display = (i === slot) ? 'block' : 'none'; });
        if (!paused) timer = setTimeout(function() { advance(1); }, 5000);
      }
      preloadNext();
    }

    function preloadNext() {
      if (!items.length) return;
      var nxt = items[(index + 1) % items.length];
      var nUrl = urlFor(nxt);
      if (nxt.media_type === 'video') {
        loadInto(vids[1 - activeVid], nUrl, 'vid', 1 - activeVid);
      } else {
        loadInto(imgs[1 - activeImg], nUrl, 'img', 1 - activeImg);
      }
    }

    vids.forEach(function(v) {
      v.onended = function() { clearTimeout(videoTimer); if (!paused) advance(1); };
      v.onerror = function() { clearTimeout(videoTimer); if (!paused) advance(1); };
    });

    function advance(n) {
      index = (index + n + items.length) % items.length;
      show();
    }

    pauseBtn.onclick = function() {
      paused = !paused;
      pauseBtn.textContent = paused ? '▶︎' : '⏸';
      if (paused) {
        clearTimeout(timer);
        clearTimeout(videoTimer);
        vids[activeVid].pause();
      } else {
        if (vids[activeVid].style.display === 'block') vids[activeVid].play();
        else timer = setTimeout(function() { advance(1); }, 5000);
      }
    };
    document.getElementById('prev').onclick = function() { advance(-1); };
    document.getElementById('next').onclick = function() { advance(1); };

    var soundBtn = document.getElementById('sound');
    soundBtn.onclick = function() {
      muted = !muted;
      vids.forEach(function(v) { v.muted = muted; });
      soundBtn.textContent = muted ? 'Sound' : 'Mute';
    };

    var videosBtn = document.getElementById('videosOnly');
    videosBtn.onclick = function() {
      videosOnly = !videosOnly;
      videosBtn.textContent = videosOnly ? 'All' : 'Videos';
      var filtered = videosOnly
        ? allItems.filter(function(i) { return i.media_type === 'video'; })
        : allItems;
      if (!filtered.length) {
        videosOnly = false;
        videosBtn.textContent = 'Videos';
        return;
      }
      items = filtered;
      index = Math.floor(Math.random() * items.length);
      show();
    };

    fetch('public/images/manifest.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        allItems = data;
        items = data;
        index = Math.floor(Math.random() * items.length);
        show();
      });
  </script>
</body>
</html>
